# Engine C — the weekly self-improvement loop. Runs Engine A (recall matrix)
# + Engine B (data sweeps), builds one rolling "Retrieval health" tracker
# issue (edited each week = week-over-week state), red on any A floor breach.
name: engine-c-health
on:
  schedule:
    - cron: "0 9 * * 0"
  workflow_dispatch: {}
concurrency:
  group: engine-c-health
  cancel-in-progress: false
permissions:
  issues: write
  contents: read
jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Engine A
        run: pnpm exec tsx scripts/eval/generated-recall.ts --json > /tmp/a.json 2> /tmp/a.log || echo "A_RED=1" >> $GITHUB_ENV
      - name: Engine B
        run: pnpm exec tsx scripts/eval/engine-b-sweeps.ts --json > /tmp/b.json 2> /tmp/b.log
      - name: Engine D (demand-side mining)
        # Mines the api-usage log for real consumer queries and replays them
        # against live — needs read access to the prod DB (no writes). If the
        # secrets are absent the step degrades and the report says so.
        continue-on-error: true
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        # --out (not a stdout pipe): Payload's logger writes startup lines to
        # stdout, which corrupted the piped JSON on the first run.
        run: pnpm exec tsx scripts/eval/engine-d-demand.ts --out=/tmp/d.json 2> /tmp/d.log
      - name: Corpus sweeps (research-docs S5-S8)
        continue-on-error: true
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
        run: pnpm exec tsx scripts/eval/engine-b-corpus.ts --out=/tmp/corpus.json 2> /tmp/corpus.log
      - name: SCF status cross-check (scfAwarded vs communityfund)
        # Public-API + SCF-site scrape only, no secrets. Verifies our
        # scfAwarded booleans against the authoritative source.
        continue-on-error: true
        run: pnpm exec tsx scripts/eval/scf-crosscheck.ts --out=/tmp/scf.json 2> /tmp/scf.log
      - name: Golden retrieval eval
        # Correctness eval (forbidden-hits/junk/bad-titles/thin) against the
        # live API — was manual-only until 2026-07-11; now standing weekly.
        continue-on-error: true
        run: pnpm exec tsx scripts/eval/run-golden.ts --json > /tmp/golden.json 2> /tmp/golden.log
      - name: Engine E (contract honesty)
        # Spec-derived param-effect + field-coverage probes against live —
        # the silent-param / advertised-but-absent guard. Public API only,
        # no secrets. Exit 1 on silentParams>0 is absorbed here (the report
        # step reds the run via the Engine E section instead).
        continue-on-error: true
        run: pnpm exec tsx scripts/eval/engine-e-contract.ts --out=/tmp/e.json 2> /tmp/e.log
      - name: Fetch previous run's evidence (week-over-week deltas)
        # Downloads the LAST successful run's engine-evidence artifact so the
        # report can render Δs. First run / expired artifact → step no-ops
        # and the report degrades to absolute values.
        continue-on-error: true
        run: |
          PREV=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=engine-c-health.yml --status=success --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$PREV" ]; then
            gh run download "$PREV" --repo "$GITHUB_REPOSITORY" -n engine-evidence -D /tmp/prev && echo "prev run: $PREV" || true
          else
            echo "no previous successful run"
          fi
      - name: Engine C report
        id: report
        run: |
          PREV_FLAG=""
          [ -f /tmp/prev/a.json ] && PREV_FLAG="--prev=/tmp/prev"
          pnpm exec tsx scripts/eval/engine-c-report.ts /tmp/a.json /tmp/b.json /tmp/d.json /tmp/corpus.json /tmp/scf.json /tmp/golden.json /tmp/e.json $PREV_FLAG > /tmp/health.md 2> /tmp/c.log || echo "C_RED=1" >> $GITHUB_ENV
          cat /tmp/health.md | tee $GITHUB_STEP_SUMMARY
      - name: Upsert rolling health issue
        run: |
          TITLE="Retrieval health — weekly tracker"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          BODY_FILE=/tmp/health.md
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" --body-file "$BODY_FILE"
            echo "updated issue #$EXISTING"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body-file "$BODY_FILE"
            echo "created tracker issue"
          fi
      - name: Upload evidence JSONs
        # The report headlines counts; the full sample lists (S6 titles, S8
        # mirror URLs, S3b groups, Engine D miss rows) live in these files.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-evidence
          path: |
            /tmp/a.json
            /tmp/b.json
            /tmp/d.json
            /tmp/corpus.json
            /tmp/scf.json
            /tmp/golden.json
            /tmp/e.json
          retention-days: 30
      - name: Fail run on floor breach
        if: env.A_RED == '1' || env.C_RED == '1'
        run: echo "::error::Engine A recall below floor — see the health tracker issue" && exit 1
