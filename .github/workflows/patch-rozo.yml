name: Patch Rozo (CCTP bridge)
on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Write the patch? Leave false for a dry run."
        type: boolean
        default: false
permissions:
  contents: read
jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx scripts/patch-rozo-cctp.ts ${{ inputs.execute && '--execute' || '' }}
