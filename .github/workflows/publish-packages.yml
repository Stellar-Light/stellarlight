# Auto-publish the npm packages (@stellar-light/api-client, @stellar-light/scout-mcp).
#
# WHY: publishing was a manual `npm publish` run on a laptop — easy to forget,
# which is how the client drifted 6 spec versions behind (1.7.21 → 1.7.27).
#
# HOW: fires when a package's package.json version is bumped on main, or on
# manual dispatch. Each package is published ONLY IF its package.json version is
# not already on npm, so re-runs and unrelated pushes are safe no-ops. The
# api-client smoke test (all read methods against the LIVE API) gates every
# publish — verify before we advertise.
#
# ONE-TIME SETUP: add an `NPM_TOKEN` repo secret — an npm *automation* token with
# publish rights to the @stellar-light scope (Settings → Secrets and variables →
# Actions). Until it is set the job SKIPS with a warning instead of failing, so
# merging a version bump never shows red.
#
# TO PUBLISH: bump the version in api-client/package.json (or scout-mcp) in your
# PR; on merge this workflow publishes it. Or run it by hand from the Actions tab.
name: publish-packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        type: choice
        options: [both, api-client, scout-mcp]
        default: both
  push:
    branches: [main]
    paths:
      - api-client/package.json
      - scout-mcp/package.json

concurrency:
  group: publish-packages-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [api-client, scout-mcp]
    steps:
      - name: Is this package selected?
        id: sel
        run: |
          WANT="${{ github.event.inputs.package || 'both' }}"
          if [ "$WANT" = "both" ] || [ "$WANT" = "${{ matrix.pkg }}" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.pkg }} not selected (chose: $WANT) — skipping"
          fi

      - uses: actions/checkout@v4
        if: steps.sel.outputs.go == 'true'
      - uses: pnpm/action-setup@v4
        if: steps.sel.outputs.go == 'true'
        with: { version: 10 }
      - uses: actions/setup-node@v4
        if: steps.sel.outputs.go == 'true'
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve name/version + npm state
        id: state
        if: steps.sel.outputs.go == 'true'
        working-directory: ${{ matrix.pkg }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          # Dir guard: only ever publish our two scoped packages, never whatever
          # else might sit in the working directory.
          case "$NAME" in
            @stellar-light/api-client|@stellar-light/scout-mcp) : ;;
            *) echo "::error::refusing to publish unexpected package: $NAME"; exit 1 ;;
          esac
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VER is already on npm — nothing to publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VER is NOT on npm — will build, verify and publish"
          fi

      - name: Build + verify (smoke test against the live API)
        if: steps.sel.outputs.go == 'true' && steps.state.outputs.published == 'false'
        working-directory: ${{ matrix.pkg }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          pnpm test

      - name: Publish to npm
        if: steps.sel.outputs.go == 'true' && steps.state.outputs.published == 'false'
        working-directory: ${{ matrix.pkg }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping publish of ${{ steps.state.outputs.name }}@${{ steps.state.outputs.ver }}. Add it in Settings → Secrets → Actions, then re-run this workflow from the Actions tab."
            exit 0
          fi
          npm publish --access public
          echo "::notice::✅ published ${{ steps.state.outputs.name }}@${{ steps.state.outputs.ver }}"
