name: Scan repo code (signals-only)

# Persists Code-Truth signals (stellarProof, codeDepth, farmScore, scan state)
# onto existing repo docs. Signals-only v1: NO tier / unverifiedStellar /
# repoScore writes (zero demotion risk by construction — write-shape.ts).
# Scores move when enrich-repos next runs. Run dry first, inspect the wave
# report (incl. predicted score lifts), then execute. Re-run for more waves —
# scanned repos are skipped, budget guard stops before the token runs dry.

on:
  # Weekly stale-first re-scan (gist gap 4): repos pushed since their last scan
  # get fresh signals (versionStatus, codeDepth, symbols) instead of waiting
  # for a manual wave. Writes are signals-only (write-shape.ts, zero-demotion
  # by construction) — the same proven write path manual waves use.
  schedule:
    # daily 03:00 UTC — backlog wave: 60 never-scanned repos/day, so the
    # ~1,700-repo backlog converges in ~a month, then this becomes a no-op
    # (the wave selector skips scanned repos; signals-only writes).
    - cron: "0 3 * * *"
    # weekly Mon 04:00 UTC — stale-first re-scan (pushed since last scan)
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      execute:
        description: "Write to the DB? Leave false for a dry run."
        type: boolean
        default: false
      limit:
        description: "Max repos this wave"
        type: string
        default: "60"
      lang:
        description: "primaryLanguage filter (e.g. Rust) or 'all'"
        type: string
        default: "Rust"
      verify:
        description: "Read-back mode: print persisted signals for scanned repos (no GitHub calls, no writes)"
        type: boolean
        default: false
      extra:
        description: "Extra flags, e.g. '--rescan --budget 150' (corrective re-scan sized to a partial token window)"
        type: string
        default: ""

permissions: { contents: read }

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      # inputs.* are EMPTY on schedule events (2026-07-08 review, finding 18 —
      # the "weekly stale-first" run was a write-nothing dry run of the wrong
      # wave). Scheduled runs get their own hardcoded step.
      - name: Daily backlog wave (schedule)
        if: github.event_name == 'schedule' && github.event.schedule == '0 3 * * *'
        run: pnpm exec tsx scripts/scan/scan-repo-code.ts --execute --limit 60
      - name: Weekly stale-first re-scan (schedule)
        if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1'
        run: pnpm exec tsx scripts/scan/scan-repo-code.ts --stale-first --execute --limit 60
      - name: Manual wave (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm exec tsx scripts/scan/scan-repo-code.ts --limit ${{ inputs.limit }} --lang ${{ inputs.lang }} ${{ inputs.execute && '--execute' || '' }} ${{ inputs.verify && '--verify' || '' }} ${{ inputs.extra }}
