# DeepWiki calibration — independent cross-check of the codeDepth answer key.
# Asks DeepWiki (Cognition/Devin, which has read each repo) to classify every
# answer-key repo as substantial vs template, and diffs that against our
# DEEP/SHALLOW label. Report-only into a rolling issue; NOT a gate.
#
# DISPATCH-ONLY (no cron) by design: DeepWiki indexes repos ON DEMAND and has
# only ~3/83 of our answer-key repos indexed (verified 2026-07-10) — a
# scheduled run would grade a near-empty set. Run it manually as coverage
# grows, or after adding new answer-key repos, to confirm an independent
# source concurs with a label. The comprehensive codeDepth validation is the
# answer-key depth-eval gate (green); this is a confidence supplement.
name: deepwiki-calibrate
on:
  workflow_dispatch: {}
concurrency:
  group: deepwiki-calibrate
  cancel-in-progress: false
permissions:
  issues: write
  contents: read
jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run calibration
        continue-on-error: true
        run: pnpm exec tsx scripts/scan/deepwiki-calibrate.ts --json > /tmp/calib.json 2> /tmp/calib.log
      - name: Build + upsert report
        run: |
          python3 - <<'EOF' > /tmp/calib.md
          import json
          try:
              d = json.load(open('/tmp/calib.json'))
          except Exception as e:
              print(f"## DeepWiki calibration — run error\n\n`{e}` (see logs)")
              raise SystemExit(0)
          f = d['frame']
          print("## DeepWiki calibration — codeDepth answer key vs independent read")
          print()
          print(f"_An independent source (DeepWiki/Devin) classifies each answer-key repo substantial-vs-template; diffed against our DEEP/SHALLOW label. Report-only — a disagreement is a review, not a gate._")
          print()
          print(f"**Graded {f['graded']}/{f['total']} (rest not DeepWiki-indexed) · agreement {d['agreementRate']}%.**")
          dis = d.get('disagreements', [])
          if dis:
              print()
              print("### Disagreements — review each (fix our label, or note a DeepWiki blind spot)")
              print()
              print("| repo | ours | deepwiki | note |")
              print("|---|---|---|---|")
              for r in dis:
                  print(f"| {r['fullName']} | {r['ourLabel']} | {r['deepwiki']} | {r['snippet']} |")
          else:
              print()
              print("No disagreements among graded repos. The answer key concurs with an independent read. ✅")
          EOF
          cat /tmp/calib.md | tee $GITHUB_STEP_SUMMARY
          TITLE="codeDepth calibration — DeepWiki cross-check"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" --body-file /tmp/calib.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body-file /tmp/calib.md
          fi
