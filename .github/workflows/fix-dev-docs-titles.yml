# One-off (manual): back-fill junky dev-docs chunk titles + delete /tags/
# aggregation dupes on prod. The script shipped with the chunk-hygiene work
# but was never executed against prod (local-DB trap — lessons class 20 era);
# golden eval still counts BAD-TITLE 11. Dry-run first, then execute=true.
name: Fix dev-docs titles (manual)
on: { workflow_dispatch: { inputs: { execute: { description: "write?", type: boolean, default: false } } } }
permissions: { contents: read }
jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx scripts/fix-dev-docs-titles.ts ${{ inputs.execute && '--apply' || '' }}
