# Spectral lint of the OpenAPI spec.
#
# Push/PR runs lint the COMMITTED SNAPSHOT (specs/openapi.json) — deterministic,
# no race against the Vercel deploy (the old live-URL lint on push graded the
# pre-deploy spec and false-failed, e.g. the 2026-07-08 19:55 run minutes after
# the fix merged). The daily scheduled run lints the LIVE URL — that's the
# serving check (catches a deploy that drifted from the repo).
# Complements scripts/check-api-drift.ts (live⇄spec agreement) and
# contract-gate.yml (snapshot freshness).
name: OpenAPI lint

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  pull_request:
    paths:
      - "src/lib/openapi-spec.ts"
      - "specs/openapi.json"
      - ".spectral.yaml"
  push:
    branches: [main]
    paths:
      - "src/lib/openapi-spec.ts"
      - "specs/openapi.json"
      - ".spectral.yaml"

permissions:
  contents: read
  issues: write

jobs:
  spectral:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Lint committed snapshot (push/PR) or live URL (schedule/manual)
        id: lint
        continue-on-error: true
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm openapi:lint 2>&1 | tee lint.log
          else
            pnpm exec spectral lint specs/openapi.json --ruleset .spectral.yaml --fail-severity=error 2>&1 | tee lint.log
          fi
      - name: Track the signal (rolling issue)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/rolling-issue
        with:
          title-prefix: "OpenAPI live lint red"
          outcome: ${{ steps.lint.outcome }}
          body-file: lint.log
      - name: Propagate the red
        if: steps.lint.outcome == 'failure'
        run: exit 1
