# Engine B — data-consistency sweeps (dispatch-only). Prose⇄structure
# divergence, field-population census, dupe detection, staleness exposure.
# Schedule RETIRED 2026-07-19: engine-c-health re-runs A+B an hour later
# and upserts the tracker issue, so this standalone Sunday run produced a
# step summary with no consumer while Actions minutes are rationed. Run it
# by hand when you want the raw B report alone.
name: engine-b-sweeps
on:
  workflow_dispatch: {}
concurrency:
  group: engine-b-sweeps
  cancel-in-progress: false
jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run Engine B
        run: pnpm exec tsx scripts/eval/engine-b-sweeps.ts | tee $GITHUB_STEP_SUMMARY
