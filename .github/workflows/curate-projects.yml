name: Curate projects (manual)
on:
  workflow_dispatch:
    inputs:
      execute: { description: "Write? Leave false for a dry run.", type: boolean, default: false }
permissions: { contents: read }
jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      # Targeted, owner-reviewed project-record edits (DESCRIPTION_FIXES in the
      # script). Dry-run by default; only the listed slugs are touched.
      - run: pnpm exec tsx scripts/data/curate-projects.ts ${{ inputs.execute && '--execute' || '' }}
