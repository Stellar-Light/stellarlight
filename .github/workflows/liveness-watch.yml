# Liveness watch — monthly delta-only review queue (roadmap: "liveness →
# monthly delta sweep"). Runs the read-only 3-signal reporter and diffs its
# shortlist against LAST month's artifact, so the owner reviews only NEW
# candidates and sees which prior ones resolved — never the full 80-row
# table again. REPORT ONLY: flips stay owner-approved STATUS_FIX rows
# (class 18: stale ≠ dead).
name: liveness-watch
on:
  schedule:
    # 07:00 UTC on the 1st of each month
    - cron: "0 7 1 * *"
  workflow_dispatch: {}
concurrency:
  group: liveness-watch
  cancel-in-progress: false
permissions:
  issues: write
  contents: read
jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run liveness report
        run: pnpm exec tsx scripts/report-liveness.ts --json > /tmp/liveness.json 2> /tmp/liveness.log
      - name: Fetch previous month's artifact
        continue-on-error: true
        run: |
          PREV=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow=liveness-watch.yml --status=success --limit 1 --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "$PREV" ]; then
            gh run download "$PREV" --repo "$GITHUB_REPOSITORY" -n liveness-evidence -D /tmp/prev || true
          fi
      - name: Build delta report
        run: |
          python3 - <<'EOF' > /tmp/watch.md
          import json, os
          now = json.load(open('/tmp/liveness.json'))
          cur = {r['slug']: r for r in now['shortlist']}
          prev = {}
          if os.path.exists('/tmp/prev/liveness.json'):
              prev = {r['slug']: r for r in json.load(open('/tmp/prev/liveness.json'))['shortlist']}
          new = [cur[s] for s in cur if s not in prev]
          resolved = [s for s in prev if s not in cur]
          print("## Liveness watch — monthly delta")
          print()
          print(f"_Frame: {now['frame']['live']} Live records. Shortlist = >=2 independent death signals. Report-only; flips go through owner-reviewed STATUS_FIX (never bulk)._")
          print()
          print(f"**Current candidates: {len(cur)} | NEW since last month: {len(new)} | resolved: {len(resolved)}**")
          if new:
              print()
              print("### New candidates (the review queue)")
              print()
              print("| project | signals | SCF |")
              print("|---|---|---|")
              for r in sorted(new, key=lambda x: not x['scfAwarded']):
                  print(f"| {r['slug']} | {' + '.join(r['signals'])} | {'x' if r['scfAwarded'] else ''} |")
          else:
              print()
              print("No new candidates this month.")
          if resolved:
              print()
              print(f"### Resolved since last month: {', '.join(sorted(resolved))}")
          if not prev:
              print()
              print("_(first tracked run — everything counts as current, deltas start next month)_")
          EOF
          cat /tmp/watch.md | tee $GITHUB_STEP_SUMMARY
      - name: Upsert rolling watch issue
        run: |
          TITLE="Liveness watch — monthly review queue"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --repo "$GITHUB_REPOSITORY" --body-file /tmp/watch.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body-file /tmp/watch.md
          fi
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: liveness-evidence
          path: /tmp/liveness.json
          retention-days: 45
