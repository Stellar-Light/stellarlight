name: Migrate research citation host (sls-003)
# One-off: repoint research-docs URLs off the rebranded sorobansecurity.com host
# to stellarsecurityportal.com. Dry-run by default; flip execute=true to write.
on:
  workflow_dispatch:
    inputs:
      execute:
        description: "Write the repoint? Leave false for a dry-run count."
        type: boolean
        default: false

permissions: { contents: read }

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: >
          pnpm exec tsx scripts/migrate-research-url-host.ts
          ${{ inputs.execute && '--execute' || '' }}
