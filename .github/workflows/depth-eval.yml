# codeDepth regression gate — asserts the DEEP/SHALLOW separation on the
# ground-truth answer key (scripts/scan/depth-labels.ts) still holds. Runs on
# any PR touching the scoring stack, plus weekly (catches upstream repo drift
# moving scores without any code change here). Read-only: GitHub fetches via
# the default Actions token; no DB, no writes.
name: codeDepth eval gate

on:
  pull_request:
    paths:
      - "src/lib/code-depth.ts"
      - "src/lib/js-depth.ts"
      - "src/lib/code-symbols.ts"
      - "scripts/scan/depth-labels.ts"
      - "src/lib/code-signals.ts"
      - "src/lib/soroban-versions.ts"
      - "src/lib/repo-allowlist.ts"
      - "scripts/scan/**"
  push:
    branches: [main]
    paths:
      - "src/lib/code-depth.ts"
      - "src/lib/js-depth.ts"
      - "src/lib/code-signals.ts"
      - "src/lib/soroban-versions.ts"
      - "src/lib/repo-allowlist.ts"
      - "scripts/scan/**"
  schedule:
    - cron: "41 5 * * 1" # weekly, Mon ~05:41 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  depth-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - name: Run codeDepth separation gate
        env:
          # Fork PRs can't read the PAT secret, so they fall back to the built-in
          # token's 1,000/hr limit — which the ~90-repo key blows past (INCONCLUSIVE
          # red, 2026-07-09). So: PR events run a SAMPLED smoke test (fits the
          # budget); push-to-main + schedule + dispatch run the FULL gate with the
          # account-wide PAT (5,000/hr, read-only public fetches).
          GITHUB_TOKEN: ${{ secrets.STELLAR_LIGHT_SCOUT_MCP_TOKEN || secrets.GITHUB_TOKEN }}
          DEPTH_EVAL_SAMPLE: ${{ github.event_name == 'pull_request' && '6' || '0' }}
        run: pnpm exec tsx scripts/scan/depth-eval.ts
